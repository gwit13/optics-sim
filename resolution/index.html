<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resolution & Pupil Engineering Demo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar Controls -->
        <aside class="sidebar">
            <h2>System Parameters</h2>

            <div class="control-group">
                <h3>Image Source</h3>
                <label>
                    Upload Image:
                    <input type="file" id="image-upload" accept="image/*">
                </label>
            </div>

            <div class="control-group">
                <h3>Optics</h3>
                <label>
                    Wavelength (&lambda;) [nm]:
                    <input type="range" id="wavelength" min="400" max="700" value="550">
                    <span id="wavelength-val">550 nm</span>
                </label>
                <label>
                    Numerical Aperture (NA):
                    <input type="range" id="na" min="0.1" max="1.5" step="0.05" value="0.5">
                    <span id="na-val">0.5</span>
                </label>
            </div>

            <div class="control-group">
                <h3>Pupil / Apodization</h3>
                <label>
                    Type:
                    <select id="apodization-type">
                        <option value="uniform">Uniform (Circular)</option>
                        <option value="annular">Annular</option>
                        <option value="gaussian">Gaussian</option>
                    </select>
                </label>
                <div id="annular-controls" style="display: none;">
                    <label>
                        Obstruction Ratio (&epsilon;):
                        <input type="range" id="epsilon" min="0.1" max="0.9" step="0.05" value="0.5">
                        <span id="epsilon-val">0.5</span>
                    </label>
                </div>
                <div id="gaussian-controls" style="display: none;">
                    <label>
                        Beam Width (&sigma;):
                        <input type="range" id="sigma" min="0.1" max="1.0" step="0.05" value="0.5">
                        <span id="sigma-val">0.5</span>
                    </label>
                </div>
            </div>

            <div class="control-group">
                <h3>Sensor</h3>
                <label>
                    Pixel Size [&mu;m]:
                    <input type="range" id="pixel-size" min="0.1" max="5.0" step="0.1" value="1.0">
                    <span id="pixel-size-val">1.0 &mu;m</span>
                </label>
            </div>

            <div class="actions">
                <button id="simulate-btn">Simulate / Recalculate</button>
            </div>

            <div class="results-panel">
                <h3>Analysis</h3>
                <p><strong>Rayleigh Limit (d):</strong> <span id="res-rayleigh">--</span> &mu;m</p>
                <p><strong>PSF FWHM:</strong> <span id="res-fwhm">--</span> &mu;m</p>
            </div>
        </aside>

        <!-- Main Display Area -->
        <main class="canvas-wrapper">
            <div class="display-grid">
                <div class="view-panel">
                    <h3>Original Image</h3>
                    <div class="canvas-container">
                        <canvas id="original-canvas"></canvas>
                    </div>
                </div>
                <div class="view-panel">
                    <h3>2D Point Spread Function</h3>
                    <div class="canvas-container">
                        <canvas id="psf-canvas"></canvas>
                    </div>
                </div>
                <div class="view-panel" style="grid-column: span 2;">
                    <h3>Simulated Result (Optical Blur + Sensor Pixelation)</h3>
                    <div class="canvas-container large">
                        <canvas id="simulated-canvas"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/math.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
